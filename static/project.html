<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目工作台 - 光伏短视频工具</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <h1><a href="/" style="color:var(--text);text-decoration:none;"><span class="logo">&#9728;</span></a> <span id="projectTitle">项目工作台</span></h1>
    <div class="actions">
        <a href="/" class="btn btn-outline btn-sm">&#8592; 返回首页</a>
    </div>
</div>

<div class="workspace">
    <!-- 步骤导航 -->
    <div class="steps-nav" id="stepsNav"></div>

    <!-- 主操作区 -->
    <div class="main-area" id="mainArea">
        <h2>加载中...</h2>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div id="modalContainer"></div>

<script>
const API = '';
const projName = new URLSearchParams(location.search).get('name');
let projectData = null;

const steps = [
    { id: 1, name: '源图提交', desc: '上传参考厂房图' },
    { id: 2, name: '识图分析', desc: 'AI 分析图片内容' },
    { id: 3, name: '提示词优化', desc: 'Agent 生成锚图提示词' },
    { id: 4, name: '锚图生成', desc: '文生图生成基准图' },
    { id: 5, name: '套图生成', desc: '批量图生图' },
    { id: 6, name: '内容编辑', desc: '编辑文字+口播' },
    { id: 7, name: '语音合成', desc: 'TTS 合成口播音频' },
    { id: 8, name: '生成草稿', desc: '构建剪映草稿' },
];
const statusMap = ['new','source_uploaded','vision_done','prompt_done','anchor_done','set_done','narration_done','draft_done'];
let currentStep = 1;

// ========== 工具函数 ==========
function toast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`; t.textContent = msg;
    c.appendChild(t); setTimeout(() => t.remove(), 3000);
}
function api(endpoint, opts={}) {
    return fetch(`${API}${endpoint}`, opts).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
    });
}

// ========== 步骤导航 ==========
function findMaxDoneStep() {
    if (!projectData) return 1;
    const s = projectData.status;
    const idx = statusMap.indexOf(s);
    return idx >= 0 ? idx + 1 : 1;
}

function renderStepsNav() {
    const maxDone = findMaxDoneStep();
    const nav = document.getElementById('stepsNav');
    nav.innerHTML = steps.map(st => {
        let cls = '';
        if (st.id === currentStep) cls = 'active';
        else if (st.id <= maxDone) cls = 'done';
        return `<div class="step-item ${cls}" onclick="goToStep(${st.id})">
            <span class="step-num">${st.id <= maxDone ? '&#10003;' : st.id}</span>
            <div><div>${st.name}</div><div style="font-size:11px;color:var(--text2)">${st.desc}</div></div>
        </div>`;
    }).join('');
}

// ========== 步骤跳转 ==========
async function goToStep(n) {
    currentStep = n;
    await loadProject();
    renderStepsNav();
    renderStep();
}

// ========== 加载项目 ==========
async function loadProject() {
    const resp = await api(`/api/projects/${projName}`);
    projectData = resp;
    document.getElementById('projectTitle').textContent = `项目: ${projName}`;
}

// ========== 渲染当前步骤 ==========
function renderStep() {
    const d = projectData;
    const main = document.getElementById('mainArea');
    let html = '';

    switch (currentStep) {
    case 1: html = renderStep1(d); break;
    case 2: html = renderStep2(d); break;
    case 3: html = renderStep3(d); break;
    case 4: html = renderStep4(d); break;
    case 5: html = renderStep5(d); break;
    case 6: html = renderStep6(d); break;
    case 7: html = renderStep7(d); break;
    case 8: html = renderStep8(d); break;
    }
    main.innerHTML = html;
}

// ===== 步骤 1：源图提交 =====
function renderStep1(d) {
    let imgTag = '';
    if (d.source_image) {
        const ts = Date.now(); // 防缓存
        imgTag = `<div style="position:relative;display:inline-block">
            <img src="/output/${projName}/${d.source_image}?t=${ts}" class="image-preview" style="max-width:400px;min-height:100px;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
                 onload="this.style.opacity='1';this.nextElementSibling.style.display='none'">
            <div style="display:none;width:400px;height:225px;background:var(--surface2);border-radius:var(--radius);align-items:center;justify-content:center;color:var(--text2)">图片预览失败</div>
        </div>`;
    }
    return `<h2>${steps[0].name}</h2><p class="desc">上传一张已安装光伏设备的工商业屋顶参考图</p>
    <div class="upload-zone ${d.source_image ? 'has-file' : ''}" id="uploadZone"
         onclick="pickFile()"
         ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
         ondragleave="this.style.borderColor=''"
         ondrop="event.preventDefault();this.style.borderColor='';handleDrop(event)">
        ${imgTag || '<p>&#128247; 拖拽或点击上传 (JPG/PNG/WEBP, &le;20MB)</p>'}
        ${d.source_image ? `<p style="font-size:11px;color:var(--text2);margin-top:8px">点击/拖拽可替换图片 (原图移至discarded)</p>` : ''}
    </div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden
           onchange="handleFileSelect(this)">
    ${d.source_image ? `<div style="margin-top:20px"><button class="btn btn-primary" onclick="goToStep(2)">下一步 &#8594;</button></div>` : ''}`;
}

function pickFile() {
    const inp = document.getElementById('fileInput');
    inp.value = '';
    inp.click();
}

function handleDrop(e) {
    const file = e.dataTransfer.files[0];
    if (!file) return;
    doUpload(file);
}

function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    doUpload(file);
}

async function doUpload(file) {
    if (!file.type.startsWith('image/')) { toast('仅支持图片格式', 'error'); return; }
    if (file.size > 20*1024*1024) { toast('文件大小不能超过 20MB', 'error'); return; }

    const form = new FormData();
    form.append('file', file);
    try {
        const resp = await fetch(`${API}/api/projects/${projName}/upload-source`, { method: 'POST', body: form });
        if (resp.ok) {
            await loadProject();
            renderStepsNav();
            renderStep();
            toast('源图上传成功', 'success');
        } else {
            const txt = await resp.text();
            toast('上传失败: ' + txt, 'error');
        }
    } catch (e) {
        toast('上传失败: ' + e.message, 'error');
    }
}

// ===== 步骤 2：识图分析 =====
function renderStep2(d) {
    const ready = !!d.source_image;
    return `<h2>${steps[1].name}</h2><p class="desc">调用 gpt-5.5 Vision 分析源图中的建筑和环境</p>
    <div style="display:flex;gap:24px;margin-bottom:20px">
        ${d.source_image ? `<img src="/output/${projName}/${d.source_image}" class="image-preview" style="max-width:300px;">` : ''}
        <div style="flex:1">
            <textarea class="text-area" id="visionResult" placeholder="识图结果将显示在这里...">${d.vision_result || ''}</textarea>
            <div style="margin-top:12px;display:flex;gap:12px">
                <button class="btn btn-primary" id="btnVision" onclick="doVision()" ${!ready?'disabled':''}>
                    ${d.vision_result ? '重新分析' : '开始识图分析'}
                </button>
                ${d.vision_result ? `<button class="btn btn-primary" onclick="goToStep(3)">下一步 &#8594;</button>` : ''}
            </div>
        </div>
    </div>`;
}
async function doVision() {
    const btn = document.getElementById('btnVision');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 分析中...';
    try {
        const resp = await api(`/api/projects/${projName}/analyze-vision`, { method: 'POST' });
        if (resp.success) {
            await loadProject();
            renderStepsNav();
            renderStep();
            toast('识图分析完成', 'success');
        } else {
            toast('识图失败: ' + resp.error, 'error');
        }
    } catch (e) { toast('请求失败: ' + e.message, 'error'); }
    btn.disabled = false; btn.textContent = '重新分析';
}

// ===== 步骤 3：提示词优化 =====
function renderStep3(d) {
    const ready = !!d.vision_result;
    const prompt = d.anchor_prompt || {};
    return `<h2>${steps[2].name}</h2><p class="desc">基于识图结果，生成文生图提示词（gpt-5.5）</p>
    <div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:var(--radius);font-size:13px;color:var(--text2)">
        <strong>识图结果：</strong><br>${d.vision_result || '(尚未识图)'}
    </div>
    <label style="font-size:14px;color:var(--text2);margin-bottom:8px;display:block">英文 Prompt（用于生图 API）：</label>
    <textarea class="text-area" id="enPrompt" style="min-height:80px">${prompt.en_prompt || ''}</textarea>
    <label style="font-size:14px;color:var(--text2);margin:16px 0 8px;display:block">中文版本（方便阅读）：</label>
    <textarea class="text-area" id="cnPrompt" style="min-height:80px">${prompt.cn_prompt || ''}</textarea>
    <div style="margin-top:12px;display:flex;gap:12px">
        <button class="btn btn-primary" id="btnPrompt" onclick="doPrompt()" ${!ready?'disabled':''}>
            ${prompt.en_prompt ? '重新生成' : '生成提示词'}
        </button>
        <button class="btn btn-outline" onclick="savePrompt()">保存修改</button>
        ${prompt.en_prompt ? `<button class="btn btn-primary" onclick="goToStep(4)">下一步 &#8594;</button>` : ''}
    </div>`;
}
async function doPrompt() {
    const btn = document.getElementById('btnPrompt');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 生成中...';
    const resp = await api(`/api/projects/${projName}/generate-prompt`, { method: 'POST' });
    if (resp.success) {
        await loadProject();
        renderStepsNav();
        renderStep();
        toast('提示词生成完成', 'success');
    } else { toast('生成失败: ' + resp.error, 'error'); }
    btn.disabled = false; btn.textContent = '重新生成';
}
async function savePrompt() {
    const en = document.getElementById('enPrompt').value;
    const cn = document.getElementById('cnPrompt').value;
    if (!projectData) projectData = {};
    projectData.anchor_prompt = { en_prompt: en, cn_prompt: cn, raw: en + '\n\n' + cn };
    await api(`/api/projects/${projName}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(projectData)
    });
    toast('提示词已保存', 'success');
}

// ===== 步骤 4：锚图生成 =====
function renderStep4(d) {
    const prompt = d.anchor_prompt || {};
    return `<h2>${steps[3].name}</h2><p class="desc">基于提示词生成锚图（gpt-image-2-all 文生图）</p>
    <div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:var(--radius);font-size:13px;color:var(--text2)">
        <strong>使用提示词：</strong>${(prompt.en_prompt || '').substring(0,200)}...
    </div>
    ${d.anchor_image ? `<img src="/output/${projName}/${d.anchor_image}" class="image-preview" style="max-width:600px;margin-bottom:16px">` : '<div class="image-preview" style="width:600px;height:338px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);margin-bottom:16px">尚未生成锚图</div>'}
    <div style="display:flex;gap:12px">
        <button class="btn btn-primary" id="btnAnchor" onclick="doAnchor()" ${!prompt.en_prompt?'disabled':''}>
            ${d.anchor_image ? '重新生成（旧图保留）' : '生成锚图'}
        </button>
        ${d.anchor_image ? `<button class="btn btn-primary" onclick="goToStep(5)">确认并生成套图 &#8594;</button>` : ''}
    </div>`;
}
async function doAnchor() {
    const btn = document.getElementById('btnAnchor');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 生成中...';
    const resp = await api(`/api/projects/${projName}/generate-anchor`, { method: 'POST' });
    if (resp.success) {
        await loadProject();
        renderStepsNav();
        renderStep();
        toast('锚图生成成功', 'success');
    } else { toast('生成失败: ' + resp.error, 'error'); }
    btn.disabled = false; btn.textContent = '重新生成（旧图保留）';
}

// ===== 步骤 5：套图生成 =====
function renderStep5(d) {
    const done = d.set_images.filter(i => !i.is_custom && i.status === 'done').length;
    const total = d.set_images.filter(i => !i.is_custom).length;
    const fail = d.set_images.filter(i => !i.is_custom && i.status === 'failed').length;

    return `<h2>${steps[4].name}</h2><p class="desc">以锚图为参考，批量图生图生成多视角套图</p>
    ${d.anchor_image ? `<img src="/output/${projName}/${d.anchor_image}" style="max-width:200px;border-radius:var(--radius);margin-bottom:16px;display:block">` : ''}
    <div class="progress-bar"><div class="fill" style="width:${total>0?(done/total*100):0}%"></div></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">已完成 ${done}/${total}${fail>0?`，失败 ${fail}`:''}</p>
    <div style="margin-bottom:16px;display:flex;gap:12px">
        <button class="btn btn-primary" id="btnSet" onclick="doSet()" ${!d.anchor_image?'disabled':''}>
            ${done>0 ? '继续生成' : '生成套图'}
        </button>
        ${done===total ? `<button class="btn btn-primary" onclick="goToStep(6)">下一步 &#8594;</button>` : ''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
        ${d.set_images.filter(i => !i.is_custom).map(img => renderSetCard(img)).join('')}
    </div>`;
}
function renderSetCard(img) {
    const statusIcons = { pending: '&#9679;', generating: '<span class="spinner"></span>', done: '&#10003;', failed: '&#10007;' };
    const statusColors = { pending: 'var(--text2)', generating: 'var(--accent)', done: 'var(--green)', failed: 'var(--red)' };
    let thumb = '';
    if (img.status === 'generating') {
        thumb = `<div style="width:100%;height:120px;background:var(--surface2);border-radius:4px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent)"><span class="spinner"></span></div>`;
    } else if (img.generated_image && img.status === 'done') {
        thumb = `<img src="/output/${projName}/${img.generated_image}" style="width:100%;height:120px;object-fit:cover;border-radius:4px;margin-bottom:8px;cursor:pointer" onclick="viewLarge(this.src)">`;
    } else {
        thumb = `<div style="width:100%;height:120px;background:var(--surface2);border-radius:4px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text2)">${statusIcons[img.status]}</div>`;
    }
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px">
        ${thumb}
        <div style="font-size:12px;font-weight:600">${img.scene}</div>
        <div style="font-size:11px;color:var(--text2)">${img.aspect_ratio} | ${img.view_angle}</div>
        <div style="font-size:11px;color:${statusColors[img.status]}">${img.status}</div>
        ${img.status==='failed' ? `<button class="btn btn-sm btn-outline" style="margin-top:4px" onclick="regenerateSet('${img.id}')">重新生成</button>` : ''}
        ${img.error_msg ? `<div style="font-size:10px;color:var(--red);margin-top:2px;word-break:break-all" title="${img.error_msg}">${img.error_msg.substring(0,60)}</div>` : ''}
    </div>`;
}

let setPollTimer = null;

async function doSet() {
    const btn = document.getElementById('btnSet');
    btn.disabled = true;
    btn.textContent = '正在提交...';

    const resp = await api(`/api/projects/${projName}/generate-set`, { method: 'POST' });
    if (resp.success) {
        toast(resp.message || '任务已提交', 'success');
        await loadProject();
        renderStep();

        // 开始轮询
        btn.textContent = '生成中...';
        setPollTimer = setInterval(async () => {
            await loadProject();
            const pending = projectData.set_images.filter(i => !i.is_custom && i.status === 'generating');
            if (pending.length === 0) {
                clearInterval(setPollTimer);
                setPollTimer = null;
                renderStepsNav();
                renderStep();
                const fail = projectData.set_images.filter(i => !i.is_custom && i.status === 'failed').length;
                const done = projectData.set_images.filter(i => !i.is_custom && i.status === 'done').length;
                toast(`套图生成完成: ${done} 成功${fail > 0 ? ', ' + fail + ' 失败' : ''}`, fail ? 'error' : 'success');
                btn.disabled = false;
                btn.textContent = '继续生成';
            } else {
                renderStep();
                btn.textContent = `生成中... (剩余 ${pending.length})`;
            }
        }, 3000);
    } else {
        toast('提交失败', 'error');
        btn.disabled = false;
        btn.textContent = '生成套图';
    }
}
function showRegenModal(setId) {
    const img = projectData.set_images.find(i => i.id === setId);
    if (!img) return;

    // 收集可选参考图: 锚图 + 所有已生成的套图
    let refOptions = [];
    if (projectData.anchor_image) {
        refOptions.push({label: '锚图', path: projectData.anchor_image});
    }
    for (const s of projectData.set_images) {
        if (s.generated_image && s.status === 'done') {
            refOptions.push({label: s.scene + ' (' + s.aspect_ratio + ')', path: s.generated_image});
        }
    }
    // 去重
    const seen = new Set();
    refOptions = refOptions.filter(r => { const k = r.path; if (seen.has(k)) return false; seen.add(k); return true; });

    const opts = refOptions.map((r, i) =>
        `<label style="display:flex;align-items:center;gap:8px;padding:6px;margin:4px 0;cursor:pointer;border-radius:4px;border:1px solid var(--border)">
            <input type="radio" name="refImage" value="${r.path}" ${i===0?'checked':''}>
            <img src="/output/${projName}/${r.path}" style="width:80px;height:45px;object-fit:cover;border-radius:3px">
            <span style="font-size:13px">${r.label}</span>
        </label>`
    ).join('');

    document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="this.remove()">
            <div class="modal-box" onclick="event.stopPropagation()" style="max-width:700px">
                <h3>重新生图 - ${img.scene}</h3>
                <div style="margin-bottom:12px">
                    <label style="font-size:14px;color:var(--text2);display:block;margin-bottom:8px">选择参考图:</label>
                    <div style="max-height:200px;overflow-y:auto">${opts}</div>
                </div>
                <div style="margin-bottom:12px">
                    <label style="font-size:14px;color:var(--text2);display:block;margin-bottom:4px">提示词 (可编辑):</label>
                    <textarea class="text-area" id="regenPrompt" style="min-height:80px">${img.prompt_diff || ''}</textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="document.getElementById('modalContainer').innerHTML=''">取消</button>
                    <button class="btn btn-primary" id="btnRegenSubmit" onclick="submitRegen('${setId}')">生图</button>
                </div>
            </div>
        </div>`;
}

async function submitRegen(setId) {
    const refImage = document.querySelector('input[name="refImage"]:checked')?.value;
    const prompt = document.getElementById('regenPrompt').value.trim();
    if (!refImage) { toast('请选择参考图', 'error'); return; }

    const btn = document.getElementById('btnRegenSubmit');
    btn.disabled = true; btn.textContent = '提交中...';

    try {
        await api(`/api/projects/${projName}/regenerate-set/${setId}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ref_image: refImage, prompt: prompt})
        });
        document.getElementById('modalContainer').innerHTML = '';
        toast('任务已提交', 'success');

        // 标记本地状态为 generating (缩略图显示加载中)
        const img = projectData.set_images.find(i => i.id === setId);
        if (img) { img.status = 'generating'; img.generated_image = null; }
        renderStep();

        // 开始轮询
        pollSetStatus(setId);
    } catch (e) {
        toast('提交失败: ' + e.message, 'error');
        btn.disabled = false; btn.textContent = '生图';
    }
}

async function pollSetStatus(setId) {
    const maxAttempts = 60;  // 最多轮询 3 分钟
    let attempts = 0;
    while (attempts < maxAttempts) {
        await new Promise(r => setTimeout(r, 3000));
        await loadProject();
        const img = projectData.set_images.find(i => i.id === setId);
        if (!img || img.status === 'done' || img.status === 'failed') {
            renderStep();
            if (img?.status === 'done') toast('生图完成', 'success');
            else if (img?.status === 'failed') toast('生图失败: ' + (img.error_msg || ''), 'error');
            return;
        }
        attempts++;
    }
    renderStep();
    toast('轮询超时，请刷新页面查看', 'info');
}

// ===== 步骤 6：内容编辑 =====
function renderStep6(d) {
    const tabs = ['16:9', '9:16'];
    let tab = (new URLSearchParams(location.search).get('tab')) || '16:9';
    return `<h2>${steps[5].name}</h2><p class="desc">编辑每张套图的显示文字和口播内容</p>
    <div class="action-bar">
        <button class="btn btn-primary btn-sm" onclick="doNarrations()">&#127881; 批量生成口播</button>
        <button class="btn btn-outline btn-sm" onclick="showCustomModal()">+ 新增套图</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('bgmInput').click()">&#9835; 上传背景音乐</button>
        <input type="file" id="bgmInput" accept="audio/*" hidden onchange="uploadBGM(this)">
    </div>
    <div class="tabs">
        ${tabs.map(t => `<button class="tab-btn ${t===tab?'active':''}" onclick="switchTab('${t}')">${t} ${t==='16:9'?'横屏':'竖屏'}</button>`).join('')}
    </div>
    <div id="setImageList">
        ${d.set_images.filter(i => i.aspect_ratio === tab && i.status === 'done').map(renderSetRow).join('') || '<p class="empty-state">该比例暂无已生成的套图</p>'}
    </div>
    <div style="margin-top:20px">
        <button class="btn btn-primary" onclick="goToStep(7)">下一步 &#8594;</button>
    </div>`;
}
function renderSetRow(img) {
    const thumbStyle = img.aspect_ratio === '9:16' ? 'width:90px;height:160px;' : 'width:160px;height:90px;';
    const imgPath = img.generated_image || img.custom_image;
    let thumbHtml = '';
    if (img.status === 'generating') {
        thumbHtml = `<div style="background:var(--surface2);border-radius:4px;${thumbStyle}display:flex;align-items:center;justify-content:center"><span class="spinner"></span></div>`;
    } else if (imgPath) {
        thumbHtml = `<img src="/output/${projName}/${imgPath}" style="${thumbStyle}object-fit:cover;border-radius:4px;cursor:pointer" onclick="viewLarge(this.src)">`;
    } else {
        thumbHtml = '<div style="background:var(--surface2);border-radius:4px;' + thumbStyle + '"></div>';
    }
    return `<div class="set-image-row">
        ${thumbHtml}
        <div>
            <div style="font-size:13px;font-weight:600;margin-bottom:6px">${img.scene} <span style="color:var(--text2);font-weight:400">(${img.aspect_ratio})</span></div>
            <div style="font-size:11px;color:var(--text2);max-height:60px;overflow:hidden;margin-bottom:8px" title="${img.prompt_diff}">提示词: ${img.prompt_diff?.substring(0,80)}...</div>
            <input class="input-field" style="margin-bottom:6px" placeholder="视频显示文字 (1~20字)" value="${img.display_text||''}"
                   onchange="updateSetField('${img.id}','display_text',this.value)">
        </div>
        <div>
            <textarea class="text-area" style="min-height:80px;font-size:13px" placeholder="口播文案"
                      onchange="updateSetField('${img.id}','narration',this.value)">${img.narration||''}</textarea>
            <div style="display:flex;gap:6px;margin-top:6px">
                <button class="btn btn-sm btn-outline" onclick="regenOneNarration('${img.id}')">生成口播</button>
                ${!img.is_custom ? `<button class="btn btn-sm btn-outline" onclick="showRegenModal('${img.id}')">重新生图</button>` : ''}
            </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;min-width:100px;text-align:center">
            <span class="status-dot ${img.status}"></span>
            <span style="font-size:11px;color:var(--text2)">${img.status}</span>
            ${img.tts_status === 'synthesizing' ? '<span style="font-size:11px;color:var(--accent)"><span class="spinner" style="width:10px;height:10px"></span> 音频生成中</span>' : ''}
            ${img.narration_audio ? `<a href="#" style="font-size:12px;color:var(--accent);text-decoration:none;margin-top:4px" onclick="playAudioPopup('${img.id}')">${img.narration_audio.split('/').pop()}</a>` : ''}
            ${img.narration_audio ? `<button class="btn btn-sm btn-outline" style="margin-top:2px;font-size:10px;padding:2px 6px" onclick="playAudioPopup('${img.id}')">&#9654;</button>` : ''}
        </div>
    </div>`;
}
function switchTab(tab) {
    const url = new URL(location);
    url.searchParams.set('tab', tab);
    history.replaceState({}, '', url);
    renderStep();
}
async function updateSetField(setId, field, value) {
    await api(`/api/projects/${projName}/set-images/${setId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({[field]: value})
    });
}
async function doNarrations() {
    const btn = event.target;
    btn.disabled = true; btn.textContent = '生成口播中...';

    toast('正在批量生成口播文案...', 'info');
    const resp = await api(`/api/projects/${projName}/generate-narrations`, { method: 'POST' });
    await loadProject();
    renderStepsNav();
    renderStep();
    toast(resp.message || '口播文案已生成', 'success');

    // 自动触发 TTS 合成
    btn.textContent = '启动TTS合成...';
    const ttsResp = await api(`/api/projects/${projName}/synthesize-tts`, { method: 'POST' });
    if (ttsResp.success) {
        await loadProject();
        renderStep();
        btn.textContent = '音频生成中...';

        // 轮询 TTS
        ttsPollTimer = setInterval(async () => {
            await loadProject();
            const items = projectData.set_images.filter(i => i.narration);
            const pending = items.filter(i => i.tts_status === 'synthesizing');
            if (pending.length === 0) {
                clearInterval(ttsPollTimer);
                ttsPollTimer = null;
                renderStepsNav();
                renderStep();
                btn.disabled = false;
                btn.textContent = '批量生成口播';
                const done = items.filter(i => i.tts_status === 'done').length;
                const fail = items.filter(i => i.tts_status === 'failed').length;
                toast(`口播+语音完成: ${done} 成功${fail > 0 ? ', ' + fail + ' 失败' : ''}`, fail ? 'error' : 'success');
            } else {
                renderStep();
                btn.textContent = `音频生成中... (${pending.length})`;
            }
        }, 2000);
    } else {
        btn.disabled = false;
        btn.textContent = '批量生成口播';
    }
}
async function regenOneNarration(setId) {
    const img = projectData.set_images.find(i => i.id === setId);
    if (!img) return;
    toast('正在生成口播...', 'info');
    img.narration = '(生成中...)';
    projectData.set_images = projectData.set_images.map(i => i.id === setId ? img : i);
    const resp = await api(`/api/projects/${projName}/generate-narrations`, { method: 'POST' });
    await loadProject();
    renderStep();
    toast('口播已生成', 'success');
}
function viewLarge(src) {
    document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="this.remove()" style="background:rgba(0,0,0,.85);z-index:1001">
            <img src="${src}" style="max-width:90vw;max-height:90vh;border-radius:8px;cursor:default" onclick="event.stopPropagation()">
        </div>`;
}

function showCustomModal() {
    document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="this.remove()">
            <div class="modal-box" onclick="event.stopPropagation()">
                <h3>新增自定义套图</h3>
                <div style="margin-bottom:12px"><label style="font-size:14px;color:var(--text2)">场景说明</label><input class="input-field" id="customScene" placeholder="如：合同签订现场"></div>
                <div style="margin-bottom:12px"><label style="font-size:14px;color:var(--text2)">比例</label>
                    <select class="input-field" id="customRatio"><option value="16:9">16:9 横屏</option><option value="9:16">9:16 竖屏</option></select></div>
                <div style="margin-bottom:12px"><label style="font-size:14px;color:var(--text2)">图片</label>
                    <div style="display:flex;gap:8px;align-items:center">
                        <button class="btn btn-outline btn-sm" onclick="document.getElementById('customFile').click()">选择文件</button>
                        <span id="customFileName" style="font-size:12px;color:var(--text2)">未选择</span>
                        <input type="file" id="customFile" accept="image/*" style="display:none" onchange="document.getElementById('customFileName').textContent=this.files[0]?.name||'未选择';const r=new FileReader();r.onload=function(){document.getElementById('customPreview').src=this.result;document.getElementById('customPreview').style.display='block'};r.readAsDataURL(this.files[0])">
                    </div>
                </div>
                <div style="margin-bottom:12px"><img id="customPreview" style="max-width:200px;max-height:150px;display:none;border-radius:var(--radius)"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" onclick="document.getElementById('modalContainer').innerHTML=''">取消</button>
                    <button class="btn btn-primary" onclick="addCustomImage()">添加</button>
                </div>
            </div>
        </div>`;
}
async function addCustomImage() {
    const scene = document.getElementById('customScene').value.trim();
    const file = document.getElementById('customFile').files[0];
    if (!scene || !file) { toast('请填写场景说明并选择图片', 'error'); return; }
    const ratio = document.getElementById('customRatio').value;
    const form = new FormData();
    form.append('file', file);
    form.append('scene', scene);
    form.append('aspect_ratio', ratio);
    const resp = await fetch(`${API}/api/projects/${projName}/custom-image`, { method: 'POST', body: form });
    if (resp.ok) {
        document.getElementById('modalContainer').innerHTML = '';
        await loadProject();
        renderStep();
        toast('自定义套图已添加', 'success');
    }
}
async function uploadBGM(input) {
    const file = input.files[0];
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    const resp = await fetch(`${API}/api/projects/${projName}/upload-bgm`, { method: 'POST', body: form });
    if (resp.ok) { await loadProject(); toast('背景音乐已上传', 'success'); }
}

// ===== 步骤 7：语音合成 =====
let ttsPollTimer = null;

function statusLabel(s) {
    if (s === 'synthesizing') return '<span class="spinner" style="width:14px;height:14px"></span> 合成中';
    if (s === 'done') return '&#10003; 已合成';
    if (s === 'failed') return '&#10007; 失败';
    return '待合成';
}
function statusColor(s) {
    if (s === 'synthesizing') return 'var(--accent)';
    if (s === 'done') return 'var(--green)';
    if (s === 'failed') return 'var(--red)';
    return 'var(--text2)';
}

function renderStep7(d) {
    const items = d.set_images.filter(i => i.narration);
    const total = items.length;
    const done = items.filter(i => i.tts_status === 'done').length;
    const synth = items.filter(i => i.tts_status === 'synthesizing').length;

    return `<h2>${steps[6].name}</h2><p class="desc">将口播文案合成为语音（MinMax TTS）</p>
    <p style="font-size:14px;color:var(--text2);margin-bottom:16px">待合成: ${total} 张 | 已合成: ${done}${synth > 0 ? ' | 合成中: ' + synth : ''}</p>
    <button class="btn btn-primary" id="btnTTS" onclick="doTTS()" ${total===0?'disabled':''}>
        ${done>0 ? '继续合成' : '一键合成全部语音'}
    </button>
    ${done>=total && total>0 ? `<button class="btn btn-primary" style="margin-left:12px" onclick="goToStep(8)">下一步 &#8594;</button>` : ''}
    <div style="margin-top:20px">
        ${items.map(img => {
            const order = String(img.order).padStart(2, '0');
            const fn = img.narration_audio ? `${order}.mp3` : `${order}.mp3`;
            return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:13px;min-width:180px">${img.scene}</span>
                <span style="font-size:12px;color:${statusColor(img.tts_status||'')}">${statusLabel(img.tts_status||'')}</span>
                ${img.narration_audio ? `<a href="#" style="font-size:13px;color:var(--accent);text-decoration:none;margin:0 12px" onclick="playAudioPopup('${img.id}')">${fn}</a>` : `<span style="font-size:13px;color:var(--text2);margin:0 12px">${fn}</span>`}
                ${img.narration_audio ? `<button class="btn btn-sm btn-outline" onclick="playAudioPopup('${img.id}')">&#9654; 试听</button>` : ''}
            </div>`;
        }).join('')}
    </div>`;
}

async function doTTS() {
    const btn = document.getElementById('btnTTS');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 提交中...';

    const resp = await api(`/api/projects/${projName}/synthesize-tts`, { method: 'POST' });
    if (resp.success) {
        toast(resp.message || '任务已提交', 'success');
        await loadProject();
        renderStep();

        btn.textContent = '合成中...';
        ttsPollTimer = setInterval(async () => {
            await loadProject();
            const items = projectData.set_images.filter(i => i.narration);
            const pending = items.filter(i => i.tts_status === 'synthesizing');
            if (pending.length === 0) {
                clearInterval(ttsPollTimer);
                ttsPollTimer = null;
                renderStepsNav();
                renderStep();
                const done = items.filter(i => i.tts_status === 'done').length;
                const fail = items.filter(i => i.tts_status === 'failed').length;
                toast(`语音合成完成: ${done} 成功${fail > 0 ? ', ' + fail + ' 失败' : ''}`, fail ? 'error' : 'success');
                btn.disabled = false;
                btn.textContent = '继续合成';
            } else {
                renderStep();
                btn.textContent = `合成中... (剩余 ${pending.length})`;
            }
        }, 2000);
    } else {
        toast('提交失败', 'error');
        btn.disabled = false;
        btn.textContent = '一键合成全部语音';
    }
}

function playAudioPopup(setId) {
    const img = projectData.set_images.find(i => i.id === setId);
    if (!img?.narration_audio) return;
    const order = String(img.order).padStart(2, '0');
    const src = `/output/${projName}/${img.narration_audio}`;
    document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="this.remove()">
            <div class="modal-box" onclick="event.stopPropagation()" style="min-width:360px;max-width:500px;text-align:center">
                <h3 style="margin-bottom:8px">${img.scene}</h3>
                <p style="font-size:13px;color:var(--text2);margin-bottom:12px">${order}.mp3</p>
                <audio controls autoplay style="width:100%;margin-bottom:12px" src="${src}"></audio>
                <button class="btn btn-outline btn-sm" onclick="document.getElementById('modalContainer').innerHTML=''">关闭</button>
            </div>
        </div>`;
}

// ===== 步骤 8：生成草稿 =====
function renderStep8(d) {
    const done16x9 = d.set_images.filter(i => i.aspect_ratio==='16:9' && i.status==='done').length;
    const done9x16 = d.set_images.filter(i => i.aspect_ratio==='9:16' && i.status==='done').length;
    return `<h2>${steps[7].name}</h2><p class="desc">选择比例，将套图+文字+语音+音乐组装为剪映草稿</p>
    <div style="margin-bottom:20px">
        <p style="font-size:14px;color:var(--text2)">16:9 横屏: ${done16x9} 张可用 | 9:16 竖屏: ${done9x16} 张可用</p>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:16px">
        <button class="btn btn-primary ${done16x9===0?'':'btn-primary'}" style="padding:16px 32px;font-size:16px"
                onclick="buildDraft('16:9')" ${done16x9===0?'disabled':''}>
            生成 16:9 横屏草稿<br><span style="font-size:12px;opacity:.7">1920×1080</span>
        </button>
        <button class="btn btn-primary" style="padding:16px 32px;font-size:16px"
                onclick="buildDraft('9:16')" ${done9x16===0?'disabled':''}>
            生成 9:16 竖屏草稿<br><span style="font-size:12px;opacity:.7">1080×1920</span>
        </button>
    </div>
    <p style="font-size:12px;color:var(--text2)">草稿将保存到剪映草稿目录，可在剪映中打开编辑</p>`;
}
async function buildDraft(aspect) {
    const draftName = `${projName}_${aspect.replace(':','x')}`;
    if (!confirm(`将生成草稿 "${draftName}" 到剪映草稿目录，确认？`)) return;
    toast('正在构建草稿...', 'info');
    const resp = await api(`/api/projects/${projName}/build-draft`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({aspect_ratio: aspect, draft_name: draftName})
    });
    if (resp.success) {
        toast(`草稿已生成！${resp.image_count} 张图，总时长 ${resp.total_duration_sec} 秒`, 'success');
    } else {
        toast('草稿生成失败: ' + (resp.error || '未知错误'), 'error');
    }
}

// ========== 初始化 ==========
(async function init() {
    if (!projName) { location.href = '/'; return; }
    try {
        await loadProject();
        currentStep = findMaxDoneStep() || 1;
        renderStepsNav();
        renderStep();
    } catch (e) {
        document.getElementById('mainArea').innerHTML = `
            <h2>加载失败</h2>
            <p style="color:var(--red);margin:16px 0">${e.message}</p>
            <button class="btn btn-outline" onclick="location.reload()">重试</button>
            <button class="btn btn-outline" style="margin-left:8px" onclick="location.href='/'">返回首页</button>`;
    }
})();
</script>
</body>
</html>
